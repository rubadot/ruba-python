name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.14"
      - run: python -m pip install uv
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ty check
      - run: uv run pytest
      - run: uv build
      - run: uv run python scripts/verify_public_artifacts.py
      - uses: pypa/gh-action-pypi-publish@release/v1
